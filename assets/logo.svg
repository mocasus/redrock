<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Redrock — Peak + chevron (deploy symbol) -->
  <defs>
    <linearGradient id="r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E05540"/>
      <stop offset="100%" stop-color="#B8301C"/>
    </linearGradient>
  </defs>
  <!-- Outer peak -->
  <polygon points="50,8 95,88 5,88" fill="url(#r)"/>
  <!-- White void -->
  <polygon points="50,34 72,76 28,76" fill="#ffffff"/>
  <!-- Upward arrow / deploy symbol inside void -->
  <g fill="none" stroke="url(#r)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <line x1="50" y1="66" x2="50" y2="46"/>
    <polyline points="43,52 50,44 57,52"/>
  </g>
</svg>
